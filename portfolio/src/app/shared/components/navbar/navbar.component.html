<nav
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
  [class.navbar-glass]="scrolled()"
  [style.borderBottom]="!scrolled() ? '1px solid transparent' : ''"
>
  <div class="container-max mx-auto px-6 py-4 flex items-center justify-between">
    <!-- Logo -->
    <a href="#hero" class="text-xl font-bold">
      <span class="gradient-text">&lt;RS /&gt;</span>
    </a>

    <!-- Desktop Nav -->
    <ul class="hidden md:flex items-center gap-8">
      <li *ngFor="let link of navLinks">
        <a
          [routerLink]="link.href"
          class="nav-link btn-ghost transition-colors duration-200"
          [class.active-link]="isActive(link.href)"
          (click)="addRipple($event)"
        >
          {{ link.label }}
        </a>
      </li>
    </ul>

    <!-- Desktop CV Button -->
    <div class="hidden md:flex items-center gap-4">
      <a href="assets/cv/romario-cv.pdf" download class="btn-cv">
        <!-- Download icon -->
        <svg
          class="cv-icon w-3.5 h-3.5"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 3v13m0 0l-4-4m4 4l4-4M4 17v1a2 2 0 002 2h12a2 2 0 002-2v-1"
          />
        </svg>
        <!-- Label -->
        <span> CV</span>
        <!-- Badge formato PDF -->
        <span
          style="
            font-size: 0.6rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            padding: 1px 5px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.25);
            line-height: 1.4;
          "
          >PDF</span
        >
      </a>
    </div>

    <!-- Mobile Menu Button -->
    <button
      class="md:hidden text-slate-300 hover:text-white transition-colors"
      (click)="toggleMenu()"
      aria-label="Toggle menu"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-6 h-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          [attr.d]="menuOpen() ? 'M6 18L18 6M6 6l12 12' : 'M4 6h16M4 12h16M4 18h16'"
        />
      </svg>
    </button>
  </div>

  <!-- Mobile Menu -->
  @if (menuOpen()) {
    <div
      class="md:hidden border-t px-6 py-4 animate-fade-in-up"
      style="
        background: rgba(11, 12, 16, 0.96);
        border-color: rgba(37, 99, 235, 0.2);
        backdrop-filter: blur(20px);
      "
    >
      <ul class="flex flex-col gap-2">
        @for (link of navLinks; track link.href) {
          <li>
            <a
              [routerLink]="link.href"
              class="nav-link btn-ghost block py-3 transition-colors duration-200"
              [class.active-link]="isActive(link.href)"
              (click)="toggleMenu(); addRipple($event)"
            >
              {{ link.label }}
            </a>
          </li>
        }
        <li class="pt-2">
          <a
            href="assets/cv/romario-cv.pdf"
            download
            class="btn-primary py-2 px-3 text-center text-sm w-full justify-center"
          >
            Descargar CV
          </a>
        </li>
      </ul>
    </div>
  }
</nav>
