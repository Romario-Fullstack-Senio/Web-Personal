<nav
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 border-b border-slate-800/50"
  [class.bg-slate-900/80]="scrolled()"
  [class.backdrop-blur-md]="scrolled()"
>
  <div class="container-max mx-auto px-6 py-4 flex items-center justify-between">
    <!-- Logo -->
    <a href="#hero" class="text-xl font-bold">
      <span class="gradient-text">&lt;RS /&gt;</span>
    </a>

    <!-- Desktop Nav -->
    <ul class="hidden md:flex items-center gap-8">
      <li *ngFor="let link of navLinks">
        <a
          [routerLink]="link.href"
          routerLinkActive="text-indigo-400"
          class="btn-ghost hover:text-indigo-400"
        >
          {{ link.label }}
        </a>
      </li>
    </ul>

    <!-- Desktop CV Button -->
    <div class="hidden md:flex items-center gap-4">
      <a href="assets/cv/romario-cv.pdf" download class="btn-primary text-sm py-2 px-4">
        <svg class="w-4 h-4 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"
          />
        </svg>
        CV
      </a>
    </div>

    <!-- Mobile Menu Button -->
    <button
      class="md:hidden text-slate-300 hover:text-white transition-colors"
      (click)="toggleMenu()"
      aria-label="Toggle menu"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-6 h-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 6h16M4 12h16M4 18h16"
        />
      </svg>
    </button>
  </div>

  <!-- Mobile Menu -->
  @if (menuOpen()) {
    <div
      class="md:hidden bg-slate-900/95 backdrop-blur-md border-t border-slate-800 px-6 py-4 animate-fade-in-up"
    >
      <ul class="flex flex-col gap-4">
        @for (link of navLinks; track link.href) {
          <li>
            <a
              [routerLink]="link.href"
              routerLinkActive="text-indigo-400"
              (click)="toggleMenu()"
              class="btn-ghost hover:text-indigo-400 block"
            >
              {{ link.label }}
            </a>
          </li>
        }
        <a
          href="assets/cv/romario-cv.pdf"
          download
          class="btn-primary py-2 px-3 text-center text-sm"
        >
          Descargar CV
        </a>
      </ul>
    </div>
  }
</nav>
