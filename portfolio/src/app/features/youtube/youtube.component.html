<section id="youtube" class="section-padding">
  <div class="container-max">
    <h2 class="cert-title mb-8">Mi Canal de YouTube</h2>
    <p class="text-slate-300 text-lg mb-6 text-center">
      ¡Bienvenido a mi canal! Aquí comparto cursos y tutoriales de desarrollo web y tecnología.
    </p>
    <div class="mb-10 flex flex-col md:flex-row gap-8 justify-center items-start">
      <div class="flex-1">
        <h3 class="text-xl font-bold text-white mb-4">Cursos destacados</h3>
        <div class="space-y-6">
          <div *ngFor="let course of courses" class="card-base p-4 flex flex-col gap-2">
            <h4 class="text-indigo-300 font-semibold text-lg">{{ course.title }}</h4>
            <p class="text-slate-400 text-sm mb-2">{{ course.description }}</p>
            <div class="aspect-video w-full rounded-lg overflow-hidden border border-slate-700">
              <iframe
                width="100%"
                height="100%"
                [src]="getSafeUrl(course.videoId)"
                frameborder="0"
                allowfullscreen
              ></iframe>
            </div>
          </div>
        </div>
      </div>
      <div class="flex-1 flex flex-col items-center">
        <h3 class="text-xl font-bold text-white mb-4">Visita mi canal</h3>
        <a
          [href]="channelUrl"
          target="_blank"
          class="btn-secondary px-8 py-3 text-lg font-bold shadow-lg hover:scale-105 transition-transform mb-6"
        >
          Ir a YouTube
        </a>
        <div class="aspect-video w-full rounded-lg overflow-hidden border border-slate-700">
          <iframe
            width="100%"
            height="100%"
            src="https://www.youtube.com/embed/Ota_t3Q-QeY"
            frameborder="0"
            allowfullscreen
          ></iframe>
        </div>
        <div class="aspect-video w-full rounded-lg overflow-hidden border border-slate-700 mt-12">
          <iframe
            width="100%"
            height="100%"
            src="https://www.youtube.com/embed/Ota_t3Q-QeY"
            frameborder="0"
            allowfullscreen
          ></iframe>
        </div>
      </div>
    </div>
  </div>
</section>
