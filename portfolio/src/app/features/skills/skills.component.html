<section id="skills" class="section-padding">
  <div class="container-max">
    <app-section-title label="Competencias" title="Skills & Tecnologías" />

    <!-- Skills Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      @for (skillGroup of __portfolioService.groupedSkills(); track skillGroup.category) {
        <div class="card-base group hover:card-hover">
          <!-- Category Header -->
          <div class="flex items-center gap-3 mb-6">
            <div class="w-10 h-10 bg-indigo-500/20 rounded-lg flex items-center justify-center">
              <span class="text-lg">{{ getCategoryIcon(skillGroup.category) }}</span>
            </div>
            <h3 class="text-lg font-bold text-white">{{ skillGroup.category }}</h3>
          </div>

          <!-- Skills List -->
          <div class="space-y-3">
            @for (skill of skillGroup.items; track skill.name) {
              <div>
                <div class="flex items-center justify-between mb-2">
                  <span class="text-sm font-medium text-slate-300">{{ skill.name }}</span>
                  <span class="text-xs text-slate-500">{{ skill.level }}%</span>
                </div>
                <div class="h-2 bg-slate-700 rounded-full overflow-hidden">
                  <div
                    class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full"
                    [style.width.%]="skill.level"
                    style="transition: width 0.6s ease-out"
                  ></div>
                </div>
              </div>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
