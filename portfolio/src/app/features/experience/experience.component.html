<section id="experience" class="section-padding">
  <div class="container-max">
    <app-section-title label="Trayectoria" title="Experiencia Profesional" />

    <div class="relative">
      <!-- Timeline line -->
      <div class="absolute left-4 md:left-8 top-0 bottom-0 w-px bg-gradient-to-b from-indigo-600 via-slate-700 to-transparent"></div>

      <div class="space-y-12">
        @for (exp of service.experiences(); track exp.id) {
          <div class="relative flex gap-6 md:gap-12 animate-fade-in-up">
            <!-- Timeline dot -->
            <div class="relative flex-shrink-0 flex items-start pt-2">
              <div class="w-8 h-8 md:w-10 md:h-10 flex items-center justify-center">
                <div class="w-3 h-3 rounded-full z-10"
                     [class.bg-indigo-500]="exp.current"
                     [class.border-2]="!exp.current"
                     [class.border-slate-600]="!exp.current"
                     [class.ring-2]="exp.current"
                     [class.ring-indigo-600/50]="exp.current"
                     [class.ring-offset-2]="exp.current"
                     [class.ring-offset-slate-900]="exp.current">
                </div>
              </div>
            </div>

            <!-- Content Card -->
            <div class="flex-1 card-hover">
              <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3 mb-3">
                <div>
                  <h3 class="text-lg font-bold text-white">{{ exp.role }}</h3>
                  <p class="text-indigo-400 font-semibold text-sm">{{ exp.company }}</p>
                </div>
                <div class="flex items-center gap-2 flex-shrink-0">
                  @if (exp.current) {
                    <span class="badge bg-green-500/20 border-green-500/50 text-green-300">
                      Actual
                    </span>
                  }
                  <span class="text-slate-500 text-sm whitespace-nowrap">{{ exp.period }}</span>
                </div>
              </div>

              <p class="text-slate-400 text-sm leading-relaxed mb-4">{{ exp.description }}</p>

              <!-- Tech Tags -->
              <div class="flex flex-wrap gap-2">
                @for (tech of exp.technologies; track tech) {
                  <span class="text-xs bg-indigo-500/10 border border-indigo-500/30 text-indigo-300 px-2.5 py-1 rounded-full font-medium">
                    {{ tech }}
                  </span>
                }
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
