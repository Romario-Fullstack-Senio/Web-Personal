<section id="experience" class="section-padding">
  <div class="container-max">
    <app-section-title label="Trayectoria" title="Experiencia Profesional" />

    <div class="relative">
      <!-- Timeline line -->
      <div
        class="absolute left-4 md:left-8 top-0 bottom-0 w-px"
        style="background: linear-gradient(to bottom, #2563eb, rgba(37, 99, 235, 0.2), transparent)"
      ></div>

      <div class="space-y-12">
        @for (exp of __portfolioService.experiences(); track exp.id) {
          <div class="relative flex gap-6 md:gap-12 animate-fade-in-up exp-card">
            <!-- Timeline dot -->
            <div class="relative flex-shrink-0 flex items-start pt-2">
              <div class="w-8 h-8 md:w-10 md:h-10 flex items-center justify-center">
                <div
                  class="w-3 h-3 rounded-full z-10 exp-icon"
                  [class.timeline-dot-active]="exp.current"
                  [class.timeline-dot-inactive]="!exp.current"
                ></div>
              </div>
            </div>

            <!-- Content Card -->
            <div class="flex-1 card-hover exp-card">
              <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3 mb-3">
                <div>
                  <h3 class="text-lg font-bold" style="color: #f8fafc">{{ exp.role }}</h3>
                  <p class="font-semibold text-sm" style="color: #22d3ee">{{ exp.company }}</p>
                </div>
                <div class="flex items-center gap-2 flex-shrink-0">
                  @if (exp.current) {
                    <span
                      class="badge text-xs"
                      style="
                        background: rgba(34, 197, 94, 0.1);
                        border-color: rgba(34, 197, 94, 0.4);
                        color: #4ade80;
                      "
                    >
                      Actual
                    </span>
                  }
                  <span class="text-sm" style="color: #94a3b8; white-space: nowrap">{{
                    exp.period
                  }}</span>
                </div>
              </div>

              <p class="text-sm leading-relaxed mb-4" style="color: #94a3b8">
                {{ exp.description }}
              </p>

              <!-- Tech Tags -->
              <div class="flex flex-wrap gap-2">
                @for (tech of exp.technologies; track tech) {
                  <span
                    class="text-xs px-2.5 py-1 rounded-full font-medium transition-all duration-300 hover:scale-105"
                    style="
                      background: rgba(37, 99, 235, 0.1);
                      border: 1px solid rgba(37, 99, 235, 0.3);
                      color: #22d3ee;
                    "
                  >
                    {{ tech }}
                  </span>
                }
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
