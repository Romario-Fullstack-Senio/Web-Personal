name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portfolio/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: portfolio

      - name: Build
        run: npm run build -- --base-href /
        working-directory: portfolio

      - name: Deploy to romario-fullstack-senio.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAGES_TOKEN }}
          external_repository: Romario-Fullstack-Senio/romario-fullstack-senio.github.io
          publish_branch: master
          publish_dir: portfolio/dist/portfolio/browser
          force_orphan: true
          enable_jekyll: false
